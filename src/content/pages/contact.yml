title: Contact | Stalwart Labs
description: >-
  Contact Stalwart Labs. Sales, support routing, press, abuse reports and
  office addresses, all in one place.
slug: /contact

hero:
  eyebrow: Contact
  title: Pick the lane that matches your question.
  titleHighlight: matches your question
  lead: >-
    Each block below routes to the right destination so we can answer
    faster.

sections:
  - kind: feature
    eyebrow: Sales
    title: Licences, pricing, evaluations and partnerships.
    body: >-
      For Enterprise pricing, volume licensing, partnership conversations
      or anything related to Stalwart Managed Email and Stalwart Migration,
      talk to sales. If you would rather try before buying, the [30-day
      Enterprise trial](https://license.stalw.art/trial) provisions a key
      instantly.
    bullets:
      - "**Email:** sales@stalw.art"
      - 'Use the contact form below and select "Sales" as the topic.'
    visual:
      kind: placeholder
      caption: "Photo / illustration needed: sales-team imagery."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Support
    title: We do not handle support through this page.
    body: >-
      Support runs through a single portal at
      [https://support.stalw.art](https://support.stalw.art). Community
      and Enterprise users open tickets in the same place; the tier is
      determined by the account.
    bullets:
      - "**Community edition.** Sign up for free and post your question on the portal. Discord, Reddit and Matrix are for general discussion only and are not support channels."
      - "**Enterprise customers.** Tickets opened from your Enterprise account are routed to the Enterprise queue automatically, with priority response and a named contact as part of every Enterprise licence."
    learnMore:
      - label: Support tier breakdown
        href: /support

  - kind: feature
    eyebrow: Press and media
    title: Coverage, interviews and analyst briefings.
    body: >-
      For interview requests, product briefings, press kits and quotes,
      write to **press@stalw.art**. We try to respond within two working
      days.

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Abuse reports
    title: Reporting spam, phishing or other abuse.
    body: >-
      To report abuse originating from infrastructure operated by Stalwart
      Labs (for example, future Stalwart Managed Email tenants), email
      **abuse@stalw.art**. Include full message headers and any timestamps
      you have; we treat these reports seriously and act on confirmed abuse.

      If you are reporting abuse from a server that runs Stalwart but is
      operated by someone else, contact that operator directly; Stalwart
      Labs is not the postmaster for self-hosted deployments.

  - kind: contact-form
    eyebrow: Contact form
    title: Anything that does not fit the categories above.
    body: For anything that does not fit the categories above, the form below reaches the same team.
    action: https://mail.stalw.art/form
    submitLabel: Send message
    topics:
      - Sales
      - Managed Email (2027)
      - Migration (2027)
      - Press
      - Abuse
      - Other
    mailboxRanges:
      - 0-100
      - 100-1,000
      - 1,000-10,000
      - 10,000-100,000
      - More than 100,000

  - kind: addresses
    band: alt
    eyebrow: Office addresses
    title: Where we are.
    items:
      - label: US Address
        lines:
          - 1309 Coffeen Avenue Ste. 1200
          - "Sheridan, WY 82801"
      - label: UK Address
        lines:
          - 128 City Road
          - "London, EC1V 2NX"
      - label: Email
        email: hello@stalw.art

  - kind: prose
    eyebrow: Hours
    title: When you can expect a reply.
    body: >-
      The team works across UK and US time zones. Sales and press emails
      are answered during business hours Monday to Friday, 09:00 to 18:00
      UK time and 09:00 to 17:00 US Mountain time. Enterprise support
      tickets follow the response targets defined in your contract;
      community-forum activity is asynchronous.

footerCta:
  cta: Talk to us
  ctaSub: Sales, partnerships, press or anything that does not fit the lanes above.
  ctaButton: Send a message
  ctaLink: "#contact-form"
