title: Support | Stalwart Labs
description: >-
  Stalwart support runs through a single portal at support.stalw.art, with
  free, Enterprise, and Premium tiers.
slug: /support

hero:
  eyebrow: Support
  title: Help when you need it.
  titleHighlight: need it
  lead: >-
    All Stalwart support runs through a single portal at
    [support.stalw.art](https://support.stalw.art), where any user can
    file a bug, suggest a new feature or get help from the community.
    Enterprise customers with Premium Support also have access to a
    private area on the same portal for opening tickets directly with
    Stalwart Labs.
  ctas:
    - label: Open the support portal
      href: https://support.stalw.art
      external: true

sections:
  - kind: feature
    eyebrow: Community Support
    title: Free support for Community-edition users.
    body: >-
      Anyone running the Community edition can sign up for the support
      portal at no cost and post questions there. It is the supported
      channel for installation questions, configuration help, bug reports
      against the open-source release, feature discussion and general
      operator questions. Stalwart Labs engineers and experienced
      operators read the portal daily.

      Stalwart also has a presence on Discord, Reddit and Matrix. Those
      venues are for general discussion only; they are not support
      channels and questions posted there may not be answered.
    learnMore:
      - label: Open the support portal
        href: https://support.stalw.art
        external: true

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Premium Support
    title: Priority Support for Enterprise customers, from 150 mailboxes.
    body: >-
      Premium Support is included at no extra cost with every
      Enterprise subscription of 150 mailboxes or more. Once activated,
      customers have access to a private area where tickets are opened
      directly with Stalwart Labs. Each ticket carries an SLA counter,
      so the response window against the contracted terms is visible
      to both sides at all times.
    bullets:
      - Priority response on tickets, with severity levels and a per-ticket SLA counter.
      - Direct escalation path to the engineers who write Stalwart.
      - Access to security advisories ahead of public disclosure where relevant.
      - Optional add-ons (purchased separately) include a dedicated Support Engineer, a custom SLA and lawful-interception assistance.

  - kind: comparison-tables
    band: alt
    eyebrow: What's covered
    title: Community Support and Premium Support, side by side.
    columns:
      - Community
      - Enterprise (Premium)
    legend: >-
      Premium Support is included with Enterprise subscriptions of
      150 mailboxes or more. Numbers and exact SLA terms are confirmed
      at contract signing.
    groups:
      - title: Coverage
        rows:
          - ["Where", "support.stalw.art", "support.stalw.art"]
          - ["Eligibility", "All users", "150 mailboxes or more"]
          - ["Response time", "Best effort", "Contracted, with per-ticket SLA counter"]
          - ["Bug triage", "Public issue tracker", "Prioritised, ticketed"]
          - ["Security advisories", "Public release notes", "Advance notice where relevant"]
          - ["Direct escalation to Stalwart engineers", "-", "yes"]
      - title: Optional add-ons (purchased separately)
        rows:
          - ["Dedicated Support Engineer", "-", "On demand"]
          - ["Custom SLA", "-", "On demand"]
          - ["Lawful-interception assistance", "-", "On demand"]

footerCta:
  cta: Find the right support tier for your deployment.
  ctaSub: Tell us about your deployment and we will recommend the right tier.
  ctaButton: Talk to sales
  ctaLink: /contact
