title: Support | Stalwart Labs
description: >-
  Stalwart support runs through a single portal at support.stalw.art, with
  free, Enterprise, and Premium tiers.
slug: /support

hero:
  eyebrow: Support
  title: One portal, three tiers.
  titleHighlight: three tiers
  lead: >-
    Stalwart support runs through a single portal at
    [support.stalw.art](https://support.stalw.art). Community users,
    Enterprise customers and Premium operators all open tickets in the
    same place; the tier is determined by the account, not by the channel.
  ctas:
    - label: Open the support portal
      href: https://support.stalw.art
      external: true

sections:
  - kind: feature
    eyebrow: Community Support
    title: Free support for Community-edition users.
    body: >-
      Anyone running the Community edition can sign up for the support
      portal at no cost and post questions there. It is the supported
      channel for installation questions, configuration help, bug reports
      against the open-source release, feature discussion and general
      operator questions. Stalwart Labs engineers and experienced
      operators read the portal daily.

      Stalwart also has a presence on Discord, Reddit and Matrix. Those
      venues are for general discussion only; they are not support
      channels and questions posted there may not be answered. If you
      need a tracked answer, open a ticket in the portal.
    learnMore:
      - label: Open the support portal
        href: https://support.stalw.art
        external: true

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Enterprise Support
    title: Contracted support for Enterprise customers.
    body: >-
      Enterprise licence-holders use the same portal at
      [support.stalw.art](https://support.stalw.art); their tickets are
      routed to the Enterprise queue automatically. Enterprise support is
      included with every Enterprise licence; no separate purchase is
      required.
    bullets:
      - Priority response on tickets, with severity levels.
      - A named technical contact at Stalwart Labs.
      - Access to security advisories ahead of public disclosure where relevant.
      - Direct escalation path to the engineers who write Stalwart.
      - Tickets tracked against the SLA terms in your contract.

  - kind: feature
    eyebrow: Premium Support
    title: On-demand options for high-volume operators.
    body: >-
      Premium Support adds capacity on top of the Enterprise standard tier.
      It is intended for hosting providers, MSPs and large in-house
      operators where downtime has a measurable cost. The minimum entry
      point is **150 mailboxes**. Premium Support is quoted per engagement.
    bullets:
      - "**Dedicated Support Engineer.** A named engineer who knows your deployment, attends review calls and handles your incidents end to end."
      - "**Custom SLA.** Negotiated response and resolution targets per severity, including 24x7 coverage with paged response where required."
      - "**Lawful interception assistance.** Help operating the lawful-interception features under court-issued orders, where applicable."
    learnMore:
      - label: Contact sales
        href: /contact

  - kind: comparison-tables
    band: alt
    eyebrow: Tier comparison
    title: What each level of support covers.
    columns:
      - Community
      - Enterprise standard
    legend: >-
      Numbers and exact SLA terms are confirmed at contract signing.
      Anything you see in public threads is best-effort; anything in your
      contract is what governs. Enterprise on-demand adds a custom SLA
      with paged escalation, a Dedicated Support Engineer and (where
      applicable) lawful-interception assistance.
    groups:
      - title: Coverage
        rows:
          - ["Where", "support.stalw.art", "support.stalw.art"]
          - ["Response time", "Best effort", "Business hours, by severity"]
          - ["Eligibility", "All users", "All Enterprise customers"]
          - ["Named contact", "—", "yes"]
          - ["Bug triage", "Public issue tracker", "Prioritised, ticketed"]
          - ["Security advisories", "Public release notes", "Advance notice where relevant"]
          - ["SLA", "—", "yes"]
          - ["Lawful interception assistance", "—", "On demand"]

footerCta:
  cta: Need a support plan
  ctaSub: Tell us about your deployment and we will recommend the right tier.
  ctaButton: Talk to sales
  ctaLink: /contact
