title: Stalwart Mail Server | Stalwart Labs
description: >-
  Modern mail server with JMAP, IMAP4rev2, POP3 and SMTP, automated DNS and
  DKIM, ACME certificates, and disk quotas per user and tenant.
slug: /mail-server

hero:
  eyebrow: Mail server
  title: Mail server fluent in JMAP, IMAP and POP3
  titleHighlight: JMAP, IMAP and POP3
  lead: >-
    Stalwart speaks every modern mail protocol natively: JMAP for clients
    that want JSON over HTTP, IMAP4rev2 and IMAP4rev1 for everything else,
    and POP3 for the long tail. Storage, search, authentication and TLS
    automation are built in, so a working server is a small set of objects,
    not a stack of glued-together daemons.
  ctas:
    - label: Get started
      href: /docs/install/get-started
  meta:
    - Open source
    - Rust-native
  visual:
    kind: screenshot
    src: /images/webadmin/dashboard-performance.png
    alt: Stalwart admin dashboard showing live performance metrics
    url: admin.stalw.art

sections:
  - kind: feature
    eyebrow: JMAP
    title: JMAP for Mail, end to end.
    body: >-
      JMAP (JSON Meta Application Protocol) is the modern successor to IMAP:
      stateful synchronisation, push updates, and JSON over HTTP instead of
      a custom wire protocol. Stalwart implements the full mail surface,
      including the WebSocket transport for live push and the supporting
      extensions clients depend on.
    bullets:
      - JMAP for Mail (RFC 8621).
      - JMAP for Sieve Scripts (draft-ietf-jmap-sieve-22).
      - JMAP over WebSocket (RFC 8887).
      - JMAP Blob Management (RFC 9404).
      - JMAP Quotas (RFC 9425).
    learnMore:
      - label: Read the JMAP overview
        href: /docs/http/jmap/overview
    visual:
      kind: placeholder
      caption: "Diagram needed: JMAP request/response over HTTP and WebSocket, with push updates and stateful sync."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: IMAP and POP3
    title: Compatibility with every IMAP and POP3 client in the wild.
    body: >-
      Stalwart ships an IMAP4rev2 server with full IMAP4rev1 compatibility,
      plus a POP3 server for legacy clients and devices. CONDSTORE and QRESYNC
      keep large mailboxes in sync without rescans; the QUOTA extension
      exposes per-account limits to clients; ManageSieve gives users a
      standard way to upload and edit Sieve filters.
    bullets:
      - IMAP4rev2 (RFC 9051) and IMAP4rev1 (RFC 3501).
      - IMAP QUOTA Extension (RFC 9208) and dozens of supported extensions.
      - ManageSieve (RFC 5804).
      - "POP3 (RFC 1939) with STLS (RFC 2595), SASL (RFC 5034) and the RFC 2449 extension set."
    visual:
      kind: placeholder
      caption: "Screenshot needed: IMAP/POP3 listener configuration in the WebUI."

  - kind: feature
    eyebrow: Automated DNS
    title: Hands-off DNS for every mail domain.
    body: >-
      Stalwart can publish and maintain a domain's MX, TXT, CNAME, SRV, CAA
      and TLSA records directly against a managed zone, removing the manual
      copy-and-paste step that breaks more deployments than any other.
      Records are reconciled on save, propagation is polled before a key is
      activated, and DNS-01 ACME challenges are coordinated with the same
      automation.
    bullets:
      - Cloudflare, Route 53, Google Cloud DNS, Bunny, Porkbun.
      - DNSimple, Spaceship, deSEC, OVH, DigitalOcean.
      - RFC 2136 dynamic update with SIG(0).
    learnMore:
      - label: Read DNS records
        href: /docs/domains/dns-records
    visual:
      kind: screenshot
      src: /images/webadmin/network-settings.png
      alt: Stalwart network settings panel
      url: admin.stalw.art / Settings / Network

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Automated DKIM rotation
    title: Generate, publish, cut over, retire.
    body: >-
      Periodic DKIM rotation is a recommended operational practice, and
      Stalwart owns the full lifecycle. New keys are generated on schedule
      (default 90 days), published in DNS, activated only after propagation
      is observed, then retired and deleted on configurable timers. Both
      Ed25519 and RSA selectors are provisioned by default, so verifiers
      that do not yet support Ed25519 still find an RSA key.
    bullets:
      - Per-domain rotation cadence with `rotateAfter`, `retireAfter`, `deleteAfter`.
      - Selector templating with date and version variables.
      - Emergency rotation on demand for suspected key compromise.
    learnMore:
      - label: Read DKIM rotation
        href: /docs/domains/dkim-rotation
    visual:
      kind: placeholder
      caption: "Screenshot needed: DKIM rotation timeline in the WebUI showing scheduled, published, and retired keys."

  - kind: feature
    eyebrow: ACME and TLS
    title: Certificates that renew themselves.
    body: >-
      Stalwart implements ACME directly. Renewals run well before expiry,
      every supported challenge type is available, and TLSA records are
      refreshed alongside the new certificate so DANE keeps validating
      without a second tool in the loop.
    bullets:
      - "TLS-ALPN-01, DNS-01, HTTP-01 and DNS-PERSIST-01 challenges."
      - External Account Binding (EAB) for CAs that require it.
      - On-demand renewal triggered after a DNS update.
      - Automatic TLSA refresh after each rotation.
    learnMore:
      - label: Read the ACME overview
        href: /docs/server/tls/acme/overview
    visual:
      kind: screenshot
      src: /images/webadmin/delivery-trace.png
      alt: Stalwart delivery trace
      url: admin.stalw.art / Emails / Delivery tests

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Autoconfig and Autodiscover
    title: Clients configure themselves.
    body: >-
      Pointing a client at a Stalwart server returns IMAP, POP, SMTP
      submission, CalDAV and CardDAV settings without the user typing a host
      name. PACC (the IETF UA Autoconfig draft) is the modern, single-document
      discovery format; the legacy Mozilla Autoconfig and Microsoft
      Autodiscover (v1 and v2) formats are served alongside it for older
      clients.
    bullets:
      - "PACC (`/.well-known/user-agent-configuration`, draft-ietf-mailmaint-pacc-02)."
      - Legacy Mozilla Autoconfig.
      - Microsoft Autodiscover v1 and v2.
    learnMore:
      - label: Read Autoconfig
        href: /docs/server/autoconfig
    visual:
      kind: placeholder
      caption: "Screenshot needed: Mail client autoconfig flow showing IMAP/SMTP/CalDAV settings returned from the server."

  - kind: feature
    eyebrow: Multi-tenancy and quotas
    title: One server, many domains, hard limits.
    body: >-
      Stalwart isolates accounts, domains and tenants from the ground up.
      Disk quotas apply per user and per tenant; aliases and catch-all
      addresses can be enabled, disabled or annotated; whole domains can be
      aliased onto another.
    bullets:
      - Domain aliases (one domain pointing at another).
      - Email aliases with descriptions; the alias mechanism can be disabled per account.
      - Plus-addressing, sub-addressing, catch-all and mailing-list expansion.
      - Disk quotas per user and per tenant.
    visual:
      kind: screenshot
      src: /images/webadmin/edit-user.png
      alt: Stalwart user account configuration
      url: admin.stalw.art / Directory / Accounts

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Sieve scripting
    title: Filter, route, and rewrite without leaving the server.
    body: >-
      Stalwart includes a full Sieve interpreter with every registered
      extension. Scripts run sandboxed; users manage their own filters
      through ManageSieve or JMAP for Sieve Scripts; administrators run
      trusted scripts at SMTP stages with elevated permissions.
    bullets:
      - Every IANA-registered Sieve extension.
      - ManageSieve and JMAP for Sieve Scripts management.
      - Trusted and untrusted execution contexts.
    visual:
      kind: placeholder
      caption: "Screenshot needed: Sieve script editor in the WebUI."

  - kind: feature
    eyebrow: Web admin
    title: Manage everything from a browser.
    body: >-
      The web admin is a single-page application that covers account, domain,
      group and mailing-list management; SMTP queue and report visualisation;
      configuration of every server object; a log viewer with search and
      filtering; and a self-service portal for password reset and
      encryption-at-rest key management.
    bullets:
      - Real-time dashboards and live tracing.
      - Account, domain, group, list and Sieve management.
      - Queue and report visualisation (DMARC, TLS-RPT, ARF).
      - Configuration of every server object via JMAP under the hood.
    visual:
      kind: screenshot
      src: /images/webadmin/dashboard-performance.png
      alt: Stalwart admin dashboard
      url: admin.stalw.art / Dashboard

footerCta:
  cta: Run a real mail server.
  ctaSub: Install Stalwart in minutes; pick the storage, search and identity backends that fit your deployment.
  ctaButton: Get started
  ctaLink: /docs/install/get-started
