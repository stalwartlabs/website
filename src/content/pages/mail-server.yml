title: Stalwart Mail Server | Stalwart Labs
description: >-
  Modern mail server with JMAP, IMAP4rev2, POP3 and SMTP, automated DNS and
  DKIM, ACME certificates, and disk quotas per user and tenant.
slug: /mail-server

hero:
  eyebrow: Mail server
  title: Mail server fluent in every protocol
  titleHighlight: every protocol
  lead: >-
    Stalwart speaks every standard mail protocol your users' clients
    already use, so no one in your fleet gets left behind. JMAP for new
    apps, IMAP for everything else, POP3 for the long tail. Storage,
    search, identity and TLS automation are part of the same server, so
    what you install is one mail server, not a stack of services to glue
    together.
  ctas:
    - label: Get started
      href: /docs/install/
  meta:
    - Open source
    - Rust-native
  visual:
    kind: screenshot
    src: /images/webadmin/dashboard-performance.png
    alt: Stalwart admin dashboard showing live performance metrics
    url: admin.stalw.art

sections:
  - kind: feature
    eyebrow: JMAP
    title: Live sync across phone, laptop and web.
    body: >-
      JMAP is the modern successor to IMAP. Clients see new mail the
      moment it arrives, stay in step across every device the user opens,
      and skip the slow rescans that older protocols force after a long
      offline period. Stalwart implements the full mail surface, including
      the live WebSocket transport and the supporting extensions clients
      depend on.
    bullets:
      - JMAP for Mail.
      - JMAP for Sieve Scripts.
      - JMAP over WebSocket.
      - JMAP Blob Management.
      - JMAP Quotas.
    learnMore:
      - label: Read the JMAP overview
        href: /docs/http/jmap/
    visual:
      kind: placeholder
      caption: "Diagram needed: JMAP request/response over HTTP and WebSocket, with push updates and stateful sync."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: IMAP and POP3
    title: No client left behind.
    body: >-
      Stalwart ships full IMAP4rev2 with IMAP4rev1 fallback, plus a POP3
      server for older devices, so an existing fleet keeps working without
      forcing a client migration. Big mailboxes stay in sync without
      rescans, per-account quotas show up in the client, and users can
      edit their own server-side filters through any ManageSieve client.
    bullets:
      - IMAP4rev2 (RFC 9051) and IMAP4rev1 (RFC 3501).
      - IMAP QUOTA Extension (RFC 9208) and dozens of supported extensions.
      - ManageSieve (RFC 5804).
      - "POP3 (RFC 1939) with STLS (RFC 2595), SASL (RFC 5034) and the RFC 2449 extension set."
    visual:
      kind: placeholder
      caption: "Screenshot needed: IMAP/POP3 listener configuration in the WebUI."

  - kind: feature
    eyebrow: Automated DNS
    title: DNS that updates itself.
    body: >-
      DNS is the most common reason a mail deployment breaks, and the
      hardest one for a generalist administrator to debug. Stalwart can
      publish and maintain a domain's records directly against a managed zone, so the manual
      copy-and-paste step that breaks the most deployments goes away.
      Records reconcile on save, propagation is checked before a key is
      activated, and DNS-01 ACME challenges run through the same
      automation.
    bullets:
      - RFC 2136 dynamic update with TSIG or SIG(0).
      - Cloudflare, Route 53, Google Cloud DNS, DigitalOcean, OVH.
      - Many other DNS providers supported.
    learnMore:
      - label: Read DNS records
        href: /docs/domains/dns-records
    visual:
      kind: screenshot
      src: /images/webadmin/network-settings.png
      alt: Stalwart network settings panel
      url: admin.stalw.art / Settings / Network

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Automated DKIM rotation
    title: A signing key that takes care of itself.
    body: >-
      Rotating DKIM signing keys on a schedule is recommended practice
      and easy to forget under operational pressure. Stalwart owns the
      full lifecycle: new keys are generated on schedule,
      published in DNS, activated only after propagation is
      observed, then retired and deleted on configurable timers.
    bullets:
      - Per-domain rotation cadence.
      - Selector templating with date and version variables.
      - Emergency rotation on demand for suspected key compromise.
    learnMore:
      - label: Read DKIM rotation
        href: /docs/domains/dkim-rotation
    visual:
      kind: placeholder
      caption: "Screenshot needed: DKIM rotation timeline in the WebUI showing scheduled, published, and retired keys."

  - kind: feature
    eyebrow: ACME and TLS
    title: Certificates that renew themselves.
    body: >-
      Expired TLS certificates are a routine cause of avoidable outages.
      Stalwart implements ACME directly so renewals run well before
      expiry, every supported challenge type is available, and TLSA
      records are refreshed alongside the new certificate so DANE keeps
      validating without a second tool in the loop.
    bullets:
      - "TLS-ALPN-01, DNS-01, HTTP-01 and DNS-PERSIST-01 challenges."
      - External Account Binding (EAB) for CAs that require it.
      - On-demand renewal triggered after a DNS update.
      - Automatic TLSA refresh after each rotation.
    learnMore:
      - label: Read the ACME overview
        href: /docs/server/tls/acme/
    visual:
      kind: screenshot
      src: /images/webadmin/delivery-trace.png
      alt: Stalwart delivery trace
      url: admin.stalw.art / Emails / Delivery tests

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Autoconfig and Autodiscover
    title: Clients configure themselves.
    body: >-
      Helpdesk tickets that begin "I can't get my email set up" disappear
      when a client can fetch its own settings from the server. Pointing
      a mail client at a Stalwart server returns IMAP, POP, SMTP, CalDAV
      and CardDAV settings without the user typing a host name. The
      modern UA Autoconfig discovery is served
      alongside the legacy Mozilla Autoconfig and Microsoft Autodiscover
      v1 and v2 formats, so old and new clients are both covered.
    bullets:
      - "Automatic Configuration of Email, Calendar, and Contact Server Settings (PACC)"
      - Legacy Mozilla Autoconfig.
      - Microsoft Autodiscover v1 and v2.
    learnMore:
      - label: Read Autoconfig
        href: /docs/server/autoconfig
    visual:
      kind: placeholder
      caption: "Screenshot needed: Mail client autoconfig flow showing IMAP/SMTP/CalDAV settings returned from the server."

  - kind: feature
    eyebrow: Multi-tenancy and quotas
    title: Many organisations, one server, with hard limits.
    body: >-
      Hosting many organisations on one server stays safe because
      accounts, domains and tenants are isolated from the ground up.
      Disk quotas are enforced per user and per tenant; aliases and
      catch-all addresses can be enabled, disabled or annotated; a whole
      domain can be redirected onto another without touching the
      mailboxes underneath.
    bullets:
      - Domain aliases (one domain pointing at another).
      - Email aliases with descriptions; the alias mechanism can be disabled per account.
      - Plus-addressing, sub-addressing, catch-all and mailing-list expansion.
      - Disk quotas per user and per tenant.
    visual:
      kind: screenshot
      src: /images/webadmin/edit-user.png
      alt: Stalwart user account configuration
      url: admin.stalw.art / Directory / Accounts

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Sieve scripting
    title: Filter, route and rewrite without leaving the server.
    body: >-
      Mail rules belong on the server, where they apply to every device
      a user opens. Stalwart includes a full Sieve interpreter with every
      registered extension. User scripts run sandboxed and are managed
      through any standard ManageSieve client or JMAP; administrators
      run trusted scripts at SMTP stages with elevated permissions.
    bullets:
      - Every IANA-registered Sieve extension.
      - ManageSieve and JMAP for Sieve Scripts management.
      - Trusted and untrusted execution contexts.
    visual:
      kind: placeholder
      caption: "Screenshot needed: Sieve script editor in the WebUI."

  - kind: feature
    eyebrow: Web admin
    title: Manage everything from a browser.
    body: >-
      Day-to-day administration happens in a browser, not in a config
      file or an SSH session. Account, domain, group and mailing-list
      management; SMTP queue and report visualisation; configuration of
      every server object; a log viewer with search; and a self-service
      portal for password reset and encryption-at-rest key management,
      all in one console.
    bullets:
      - Real-time dashboards and live tracing.
      - Account, domain, group, list and Sieve management.
      - Queue and report visualisation (DMARC, TLS-RPT, ARF).
      - Configuration of every server object via JMAP under the hood.
    visual:
      kind: screenshot
      src: /images/webadmin/dashboard-performance.png
      alt: Stalwart admin dashboard
      url: admin.stalw.art / Dashboard

footerCta:
  cta: Run a real mail server.
  ctaSub: Install Stalwart in minutes; pick the storage, search and identity backends that fit your deployment.
  ctaButton: Get started
  ctaLink: /docs/install/
