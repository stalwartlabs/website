title: Stalwart Collaboration Server | Stalwart Labs
description: >-
  Calendars, contacts and file storage over CalDAV, CardDAV, WebDAV and JMAP,
  with scheduling, sharing and email notifications built in.
slug: /collaboration

hero:
  eyebrow: Collaboration
  title: A collaboration server, not a bolt-on
  titleHighlight: not a bolt-on
  lead: >-
    Calendars, contacts and shared files live in the same Stalwart
    instance as the email, sharing one sign-in, one set of disk quotas,
    one sharing model and one backup. CalDAV, CardDAV and WebDAV cover
    every existing client; the modern JMAP equivalents are there too,
    for the apps that already use them.
  ctas:
    - label: Get started
      href: /docs/install/
  meta:
    - Open source
    - Same identity, quotas, ACLs as mail
  visual:
    kind: screenshot
    src: /images/webadmin/calendar-edit.png
    alt: Stalwart calendar settings
    url: admin.stalw.art / Calendars

sections:
  - kind: feature
    eyebrow: Calendars
    title: Calendars that sync where your users already work.
    body: >-
      Calendars in Stalwart show up in the apps your users already have.
      CalDAV covers Apple Calendar, Outlook, Thunderbird and every mobile
      client in the field; JMAP for Calendars covers the next generation
      of JSON-native apps that are starting to ship.
    bullets:
      - CalDAV (RFC 4791) and CalDAV Scheduling (RFC 6638).
      - JMAP for Calendars.
      - Pre-expanded recurrence with configurable limits.
      - Per-account and per-tenant calendar caps.
      - Group and shared calendars.
    learnMore:
      - label: Read the Calendar docs
        href: /docs/collaboration/calendar
    visual:
      kind: screenshot
      src: /images/webadmin/calendar-edit.png
      alt: Calendar configuration
      url: admin.stalw.art / Calendars

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Scheduling
    title: Invitations that arrive everywhere they need to.
    body: >-
      An invitation should reach an attendee whether or not they are on
      the same server. Stalwart delivers invitations server-side
      (CalDAV Scheduling) for attendees on the same deployment, and as
      iMIP email for everyone else, so neither side has to know how the
      other receives mail. Free/busy lookups round out the picture; on
      Enterprise, attendee scheduling extends across federated calendar
      peers.
    bullets:
      - iTIP exchange of REQUEST, REPLY, CANCEL and update messages.
      - iMIP fallback for attendees that do not speak CalDAV.
      - Attendee scheduling and free/busy lookup [Enterprise].
      - Inbox auto-expunge and configurable recipient limits.
    learnMore:
      - label: Read Scheduling
        href: /docs/collaboration/scheduling
    visual:
      kind: placeholder
      caption: "Diagram needed: iTIP/iMIP scheduling flow showing internal CalDAV peers vs external email recipients."

  - kind: feature
    eyebrow: Contacts
    title: Address books that sync everywhere.
    body: >-
      Contacts are exposed over CardDAV and over JMAP for
      Contacts using the modern JSContact model. The same address-book
      entries pay off elsewhere in the server: a sender already in a
      recipient's contacts is treated as a known correspondent by the
      spam filter and the calendar scheduler, which removes a common
      source of false positives.
    bullets:
      - CardDAV (RFC 6352) with vCard 2.1, 3.0 and 4.0.
      - JMAP for Contacts (RFC 9610) with JSContact.
      - Personal, group and shared address books.
      - Address-book signal feeds back into spam scoring and scheduling.
    learnMore:
      - label: Read the Contacts docs
        href: /docs/collaboration/contact
    visual:
      kind: placeholder
      caption: "Screenshot needed: CardDAV address-book view in the WebUI."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: File storage
    title: Shared files alongside the mail.
    body: >-
      Shared files live in the same server as the mail, so there is no
      second product to operate or pay for. Stalwart serves files over
      WebDAV for any standard file manager, and
      over JMAP for File Storage for clients that prefer the JSON model.
      The same disk quota that caps a mailbox caps its files, so a user
      cannot bypass the cap by uploading files instead of mail.
    bullets:
      - WebDAV (RFC 4918) for desktop and mobile file managers.
      - JMAP for File Storage (draft-ietf-jmap-filenode).
      - Unified quota with email storage.
      - Personal, group and shared file spaces.
    learnMore:
      - label: Read File Storage
        href: /docs/collaboration/file-storage
    visual:
      kind: placeholder
      caption: "Screenshot needed: WebDAV file storage view in the WebUI."

  - kind: feature
    eyebrow: Sharing
    title: Share what you want, with who you want.
    body: >-
      Calendars, address books and file collections all share the same
      sharing model, so a user only learns one set of permissions to
      cover the lot. Read, write and manage rights can be granted to
      individual users, to groups, to whole tenants, or to anonymous
      links. WebDAV ACL covers the legacy clients; JMAP Sharing covers
      the JMAP ones.
    bullets:
      - WebDAV ACL (RFC 3744).
      - JMAP Sharing (RFC 9670).
      - Read, write and manage permissions per principal.
      - Group and tenant principals.
    visual:
      kind: placeholder
      caption: "Screenshot needed: Sharing/ACL editor in the WebUI."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Notifications
    title: Reminders that still arrive when the client drops them.
    body: >-
      A meeting reminder is only useful if it actually fires. Stalwart
      sends iCalendar email-action alarms (`VALARM` with `ACTION:EMAIL`)
      from the server, and falls back gracefully when a client (Apple
      Calendar, for example) strips that alarm before saving the event:
      an `@email` marker in the alarm summary or description tells
      Stalwart to deliver the alert anyway. Per-account interval limits
      and external-recipient policies keep the feature from being abused.
    bullets:
      - iCalendar `VALARM` with `ACTION:EMAIL`.
      - "`@email` marker for clients that strip the email action."
      - Per-account minimum trigger interval (default 1 hour).
      - External-recipient policy on or off per deployment.
    learnMore:
      - label: Read Notifications
        href: /docs/collaboration/notifications
    visual:
      kind: placeholder
      caption: "Diagram needed: VALARM/ACTION:EMAIL fallback path with @email marker."

  - kind: list
    eyebrow: Discovery and clients
    title: Works with Apple, Thunderbird, GNOME, KDE and mobile.
    body: >-
      Pointing a client at a Stalwart server is enough; the right paths
      are advertised at `/.well-known/caldav` and `/.well-known/carddav`,
      and PACC, Mozilla Autoconfig and Microsoft Autodiscover documents
      point clients at the right endpoints. Assisted resource discovery
      (added in v0.13) and CalDAV/CardDAV/WebDAV autoconfig (added in
      v0.14) cover the cases where a client cannot guess the path on its
      own.
    bullets:
      - Apple Mail, Calendar and Contacts.
      - Thunderbird (Lightning, TbSync).
      - GNOME Evolution, KDE Kontact / Akonadi.
      - iOS, Android and other mobile CalDAV / CardDAV clients.
      - Any JMAP client following the published drafts.

footerCta:
  cta: Run mail and collaboration on one server.
  ctaSub: One identity, one quota, one access model. Calendars, contacts and files included.
  ctaButton: Get started
  ctaLink: /docs/install/
