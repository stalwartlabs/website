sections:
  - kind: feature
    eyebrow: Multi-tenancy
    title: Run many organisations on one cluster.
    body: >-
      Hosting many customers on shared infrastructure only works if the
      isolation between them is real. Each Stalwart tenant has its own
      accounts, groups, mailing lists and domains, and principals from
      one tenant cannot reach another tenant's resources. Per-tenant
      disk quotas and principal-count quotas cap how much of the cluster
      a tenant can consume; tenant administrators are bounded by the
      permissions allocated to that tenant.

      Per-domain directory backends let one tenant authenticate against
      the internal directory while another binds to its own LDAP, OpenID
      Connect or SQL backend, so customers keep their existing identity
      systems on a shared Stalwart deployment.
    learnMore:
      - label: Multi-tenancy reference
        href: /docs/auth/authorization/tenants
    visual:
      kind: screenshot
      src: /images/webadmin/edit-user.png
      alt: Tenant configuration in the WebUI
      url: admin.stalw.art / Directory / Tenants

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Branding
    title: Every tenant sees its own brand.
    body: >-
      A hosted customer does not want to see your logo in the admin
      console; they want to see their own. Stalwart serves a per-tenant
      and per-domain logo on the web admin based on the hostname of the
      incoming request, falling back from Domain to Tenant to a
      system-wide default. The same applies to the customer-facing
      Account Manager at `/account`, where end users sign in to manage
      their own password, application passwords, two-factor authentication
      and masked email addresses, all under the brand they recognise.
    learnMore:
      - label: Branding reference
        href: /docs/management/webui/branding
    visual:
      kind: placeholder
      caption: "Screenshot needed: Two side-by-side WebUI views with different tenant logos and accent colours."

  - kind: feature
    eyebrow: Account archiving and un-deletion
    title: Get deleted mail back, without restoring from backup.
    body: >-
      Most "we need to restore from backup" tickets are really about a
      single deleted mailbox or a handful of deleted messages, not a
      whole-server failure. Stalwart keeps deleted emails in an archive
      for a configurable window (`archiveDeletedItemsFor`, for example
      `"30d"`) instead of removing them outright. Administrators can
      list archived items with their original `From`, `Subject` and
      `Received` headers, then restore individual messages or whole
      accounts; the same archive backs full account un-deletion.

      This shortens the recovery loop after a misconfigured Sieve rule,
      an over-eager retention policy or a user mistake. It does not
      replace backups, but it removes the most common reason operators
      reach for them.
    learnMore:
      - label: Storage and retention reference
        href: /docs/storage/
    visual:
      kind: placeholder
      caption: "Screenshot needed: Archived items list in the WebUI with From / Subject / Received columns."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Live telemetry and metric alerts
    title: Watch the server in real time, alert on what matters.
    body: >-
      A support engineer triaging a ticket should not have to wait for a
      log shipper. The live telemetry endpoints stream structured logs,
      traces and metrics over Server-Sent Events;
      `/api/telemetry/traces/live` carries every server event as a JSON
      object that can be filtered by remote IP, domain, account,
      protocol or any other event key.

      Alerts evaluate expressions against the live metrics stream and
      fire when a condition holds. Conditions can combine multiple
      metrics with logical operators (for example
      `store_foundationdb_error > 100 || store_s3_error > 100`); when
      the condition holds, Stalwart can emit a `telemetry.alert` event
      for downstream webhooks, send an email to a list of recipients,
      or both. Message bodies and subjects can interpolate the
      offending metric values.
    learnMore:
      - label: Live telemetry
        href: /docs/telemetry/live
      - label: Metric alerts
        href: /docs/telemetry/alerts
    visual:
      kind: screenshot
      src: /images/webadmin/dashboard-performance.png
      alt: Live performance dashboard
      url: admin.stalw.art / Dashboard / Performance
      glow: true

  - kind: feature
    eyebrow: AI-assisted spam filtering and Sieve scripting
    title: AI in the spam filter, not just on the side.
    body: >-
      The Enterprise spam classifier can call out to a large language
      model alongside the statistical classifier, the blocklist pipeline
      and the rest of the anti-spam stack, so a model gets the chance
      to read the messages your filter is least sure about. The same AI
      integration is available to Sieve scripts through the
      `llm_prompt(model_name, prompt, temperature)` function, which
      sends arbitrary email content to a configured model and returns
      the response for the script to act on. Trusted scripts use it
      directly; user scripts gate it behind the `ai-model-interact`
      permission so quotas and costs stay under operator control.

      Any OpenAI-compatible chat or text-completion endpoint is
      supported, so models can run on a hosted provider (OpenAI,
      Anthropic) or on infrastructure you already operate, for privacy
      or cost reasons.
    learnMore:
      - label: Sieve LLM integration
        href: /docs/sieve/llm
      - label: AI model configuration
        href: /docs/server/ai-models
    visual:
      kind: placeholder
      caption: "Screenshot needed: AI Model object configured with a hosted endpoint, used in a Sieve script."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Masked email
    title: Disposable addresses for users who care about privacy.
    body: >-
      A privacy-conscious user wants a different email address for every
      site they sign up to, so a leak at one site does not become spam
      at the rest. Stalwart lets end users create disposable addresses
      from the Account Manager or through any password manager that
      speaks JMAP. Each mask is bound to one account, has its own
      description, optional `forDomain` (the site it was issued to),
      optional expiry, and an `enabled` toggle that lets the user
      disable a leaking address without losing the record of where it
      was handed out. The local part is server-generated; integrators
      can pin a prefix or pick from any domain the account is linked to.

      This gives mailbox operators a privacy primitive to surface to
      their customers without running a separate aliasing service.
    learnMore:
      - label: Masked email reference
        href: /docs/email/management/masked-email
    visual:
      kind: placeholder
      caption: "Screenshot needed: Masked-email manager in the Account Manager portal."

  - kind: feature
    eyebrow: Read replicas and sharded storage
    title: Scale the data plane without rewriting the cluster.
    body: >-
      Read traffic outweighs write traffic in a typical mail deployment,
      and the easiest way to absorb the read side is to add replicas.
      Stalwart routes read-heavy workloads (IMAP fetches, JMAP queries,
      full-text search) to secondary copies of the data store while
      writes continue to target the primary. Sharded blob storage
      spreads message bodies across multiple blob backends, so total
      throughput and capacity grow with each shard added. Sharded
      in-memory data stores do the same for the hot-path key-value
      layer used by sessions, rate limits and Sieve compilation caches.
    learnMore:
      - label: Storage backends
        href: /docs/storage/backends/
    visual:
      kind: diagram
      id: cluster

  - kind: list
    band: alt
    eyebrow: For mail-hosting providers and MSPs
    title: One deployment, many customers, your brand.
    body: >-
      For ISPs, MSPs and white-label hosters, the operational features
      above combine into a single hosting platform.
    bullets:
      - "**Multi-tenancy** isolates customers from each other, with per-tenant disk and principal quotas and per-domain directory backends."
      - "**Branding** lets each customer see their own logo at their own domain, on the same WebUI bundle."
      - "**Account Manager** gives each customer's end users a self-service portal for passwords, 2FA, application passwords and masked email."
      - "**Live telemetry, alerts and message delivery history** give support engineers the data they need to triage tickets."
      - "**Lawful interception** is available on demand for jurisdictions that require it."
      - "**Domain-anchored licensing** ties the Enterprise key to a domain name and keeps the per-server count unlimited under that domain."

  - kind: feature
    eyebrow: Support
    title: Priority response, named contact, optional SLA.
    body: >-
      Production deployments need a way to reach the people who build
      the server, not just a community forum. Enterprise customers reach
      Stalwart Labs through the support portal at
      [support.stalw.art](https://support.stalw.art) instead of the
      community channels. The standard tier includes priority response
      and a named contact; the Premium tier adds a dedicated Support
      Engineer, a custom SLA and lawful-interception assistance.
      Premium Support requires a deployment of 150 mailboxes or more.
    learnMore:
      - label: Support tiers
        href: /support

