title: Compare editions | Stalwart Labs
description: >-
  Side-by-side comparison of the Community and Enterprise editions of the
  Stalwart mail and collaboration server.
slug: /compare

hero:
  eyebrow: Compare editions
  title: Pick the edition that fits your deployment.
  titleHighlight: fits your deployment
  lead: >-
    Stalwart ships in two editions that share the same code base:
    Community (AGPL-3.0) and Enterprise (commercial).
    Both implement the same protocols and core features. The
    Enterprise edition adds operational tooling for larger or
    multi-tenant deployments.
  ctas:
    - label: See pricing
      href: /pricing
    - label: Buy now
      href: https://license.stalw.art/buy
      external: true
      primary: false
    - label: Start a 30-day trial
      href: https://license.stalw.art/trial
      external: true
      primary: false

