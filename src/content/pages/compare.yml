  - kind: faq
    band: alt
    eyebrow: Licensing FAQ
    title: Common licensing questions.
    items:
      - question: What changed in v0.16?
        answer: >-
          v0.16 introduced several breaking changes. The REST `/api`
          management endpoints were removed (management goes through the
          JMAP API at `/jmap` now). Configuration moved from TOML files to
          configuration objects stored inside JMAP, edited through the Web
          admin, the CLI (`stalwart-cli apply` and `snapshot`), or directly
          via JMAP. Outbound ARC sealing was removed (inbound verification
          unchanged). The GitHub repository was renamed from
          `stalwartlabs/mail-server` to `stalwartlabs/stalwart`. The
          `smtp`, `imap` and `memory` directory backends were removed; use
          internal, LDAP or SQL backends instead. Full upgrade notes are
          in `UPGRADING/v0_16.md` in the repository.
      - question: Why is feature X not open source?
        answer: >-
          Sustaining full-time development of a mail and collaboration
          server requires funding that sponsorship alone has not covered.
          The Enterprise edition exists to fund that work. Revenue from
          Enterprise subscriptions pays the developers, who continue to
          maintain and extend the Community edition under AGPL-3.0. The
          Community edition already includes more functionality than most
          paid alternatives. If you want to support more features moving
          to AGPL, [become a sponsor](https://opencollective.com/stalwart).
      - question: Can I trust that all open-source features will remain free?
        answer: >-
          Yes. Stalwart is licensed under AGPL-3.0 and we will not move
          existing open-source features behind a paywall. The Enterprise
          edition only adds new features on top of the Community edition;
          nothing that ships under AGPL will be reclassified.
      - question: What does the Enterprise license include?
        answer: >-
          Operational features for larger and multi-tenant deployments:
          multi-tenancy with per-domain directory backends, multi-tenant
          branding, account archiving and un-deletion, the AI / LLM spam
          classifier, AI-assisted Sieve scripting, read replicas, sharded
          blob and in-memory stores, live telemetry, message delivery
          history, dashboards, and metric alerts. A full per-feature
          breakdown is in the table above and on the [Enterprise edition](/enterprise) page.
          Premium Support is available to Enterprise customers with **150
          or more mailboxes**.
      - question: How does the Enterprise licensing work?
        answer: >-
          Enterprise licensing is sold per mailbox as a subscription,
          billed annually or monthly. Pricing is tiered: the per-mailbox
          cost decreases as the mailbox count rises. Annual billing
          receives a discount over monthly. The full table is on the
          [pricing page](/pricing). After purchase you receive a license
          key that activates the Enterprise features. Keys are issued to
          a **server domain name** and can be used on an unlimited number
          of servers under that domain.
      - question: How can I upgrade to Enterprise?
        answer: >-
          Visit the [Stalwart Labs Licensing Portal](https://license.stalw.art/buy).
          Credit-card purchases are issued instantly; the key activates
          the Enterprise features as soon as it is installed.
      - question: Can I try Enterprise before I buy?
        answer: >-
          Yes. A 30-day trial license with full access to all Enterprise
          features is available at [license.stalw.art/trial](https://license.stalw.art/trial).
      - question: What happens if I cancel my Enterprise subscription?
        answer: >-
          The server reverts to the Community edition. Enterprise-only
          features stop, but no data is lost: mailboxes, calendars,
          contacts, file storage and configuration remain intact, and
          standard email and collaboration service continues without
          interruption.

