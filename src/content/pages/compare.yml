title: Compare editions | Stalwart Labs
description: >-
  Side-by-side comparison of the Community and Enterprise editions of the
  Stalwart mail and collaboration server.
slug: /compare

hero:
  eyebrow: Compare editions
  title: Same code, two licenses.
  titleHighlight: Same code
  lead: >-
    Stalwart ships in two editions that share the same code base: Community
    (AGPL-3.0, free) and Enterprise (commercial license, from EUR 2 per
    mailbox per year). Both editions implement the same protocols and core
    features. The Enterprise edition adds operational features for larger
    or multi-tenant deployments.
  ctas:
    - label: See pricing
      href: /pricing
    - label: Buy now
      href: https://license.stalw.art/buy
      external: true
      primary: false
    - label: Start a 30-day trial
      href: https://license.stalw.art/trial
      external: true
      primary: false

