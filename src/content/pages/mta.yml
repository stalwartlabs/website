title: Stalwart MTA | Stalwart Labs
description: >-
  Programmable SMTP server with distributed virtual queues, DMARC, DKIM, SPF,
  ARC verification, DANE, MTA-STS, TLS-RPT, milter and MTA Hooks.
slug: /mta

hero:
  eyebrow: SMTP server
  title: A programmable, distributed MTA
  titleHighlight: distributed MTA
  lead: >-
    Stalwart's MTA delivers your outbound mail and accepts the inbound
    traffic for it, with sender authentication, transport-layer
    security, a queue that survives node failure and a programmable
    filter pipeline, all in the same binary as the rest of the server.
    Run it next to the mail store on a small deployment, or pull it out
    into a dedicated outbound tier when the volume grows.
  ctas:
    - label: Get started
      href: /docs/install/
  meta:
    - Open source
    - Distributed queue
  visual:
    kind: screenshot
    src: /images/webadmin/delivery-trace.png
    alt: Stalwart delivery trace
    url: admin.stalw.art / Emails / Delivery tests

sections:
  - kind: feature
    eyebrow: Sender and message authentication
    title: Prove the mail you send is really yours.
    body: >-
      Sender authentication is what stops a stranger from emailing your
      customers as you, and what stops a forged message from your bank
      from reaching your inbox. Stalwart implements every supported
      standard natively, with both verification and reporting paths.
      DKIM signing pairs with the [automated DKIM
      rotation](/docs/domains/dkim-rotation) on the Mail Server side, so
      signing keys generate, publish and retire themselves.
    bullets:
      - DMARC (RFC 7489) verification, alignment checking and aggregate / failure reporting.
      - DKIM (RFC 6376) signing, verification and failure reporting; Ed25519 and RSA selectors.
      - SPF (RFC 7208) policy evaluation and failure reporting.
      - ARC (RFC 8617) verification on inbound; relaxed and strict modes.
      - Reverse-DNS (iprev) validation.
      - Automatic ingestion of received DMARC, TLS-RPT and ARF reports.
    visual:
      kind: screenshot
      src: /images/webadmin/dmarc-report.png
      alt: DMARC report visualisation
      url: admin.stalw.art / Reports / DMARC

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Transport security
    title: Encryption that doesn't fall back silently.
    body: >-
      Mail in transit between servers should always be encrypted, and the
      standards that enforce that (DANE, MTA-STS) should make it visible
      when something tries to downgrade. Stalwart enforces transport
      security on outbound delivery through per-strategy TLS policies,
      reports incoming TLS failures and successes back to senders, and
      keeps TLSA records in sync with the automated DNS management that
      handles MX and DKIM, so DANE does not silently break after a
      certificate rollover.
    bullets:
      - DANE (RFC 6698) with `optional`, `require` and `disable` modes per TLS strategy.
      - MTA-STS (RFC 8461) policy fetching and enforcement.
      - SMTP TLS Reporting (RFC 8460) delivery and ingestion.
      - Automatic TLSA refresh with ACME certificate rotation.
    visual:
      kind: screenshot
      src: /images/webadmin/delivery-trace.png
      alt: TLS handshake trace
      url: admin.stalw.art / Emails / Delivery tests
      glow: true

  - kind: feature
    eyebrow: Distributed virtual queues
    title: A queue that survives node failure.
    body: >-
      An outbound queue stuck on a single node loses mail when that node
      dies; an outbound queue with one big channel lets a bulk burst
      block transactional traffic. Stalwart avoids both problems. The
      outbound queue lives in a distributed, fault-tolerant store, so any
      node in the cluster can pick up a message and a node failure does
      not strand its messages. Each virtual queue carries its own
      concurrency, retry policy and quota, so transactional, bulk and
      report traffic do not interfere with each other.
    bullets:
      - Distributed, fault-tolerant queue store; no per-node local spool.
      - Unlimited virtual queues with per-queue concurrency.
      - Delayed delivery, priority delivery and per-queue quotas.
      - Dynamic routing rules and per-domain throttling.
      - Smart-host and relay routing for upstream submission.
      - Outbound MTA cluster role for dedicated submission tiers.
    learnMore:
      - label: Read the outbound queue docs
        href: /docs/mta/outbound/queue
    visual:
      kind: screenshot
      src: /images/webadmin/tasks.png
      alt: Stalwart task queue
      url: admin.stalw.art / Tasks

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Filter pipeline
    title: Filter, scan and rewrite at every SMTP stage.
    body: >-
      Inbound mail can be filtered at every SMTP stage from `connect`
      through `data`, so abusive traffic is rejected as early as
      possible and legitimate traffic only pays for the checks it
      actually needs. Sieve scripts cover server-side rules; milter and
      MTA Hooks plug into existing filtering infrastructure; the built-in
      [spam filter](/anti-spam) is always available without an extra
      daemon to install.
    bullets:
      - Sieve (RFC 5228) with every IANA-registered extension.
      - Milter for Rspamd, ClamAV, SpamAssassin or any sendmail-compatible filter.
      - "MTA Hooks: HTTP + JSON alternative to milter, with Basic and Bearer auth."
      - Built-in spam and phishing filter; no external Rspamd required.
      - "Per-stage invocation: `connect`, `ehlo`, `auth`, `mail`, `rcpt`, `data`."
    learnMore:
      - label: Read milter
        href: /docs/mta/filter/milter
      - label: Read MTA Hooks
        href: /docs/mta/filter/mtahooks
    visual:
      kind: placeholder
      caption: "Diagram needed: SMTP stages (connect / ehlo / auth / mail / rcpt / data) with Sieve, milter, MTA Hooks and built-in filter as parallel processors."

  - kind: feature
    eyebrow: Envelope and message rewriting
    title: Change the address, the headers, the body or the attachments.
    body: >-
      Compliance disclaimers, address normalisation and attachment policy
      should be enforced by the server, not asked of every user. Stalwart
      can rewrite envelope addresses, add or remove headers, append
      disclaimers and strip attachments before queueing or delivery, with
      rules that branch on listener, sender, recipient or any other
      message metadata.
    bullets:
      - Address rewriting (sender, recipient, domain).
      - Header add, modify, remove.
      - Body modification and attachment policy.
      - Inbound concurrency and rate limiting.
    learnMore:
      - label: Read message rewriting
        href: /docs/mta/rewrite/
    visual:
      kind: placeholder
      caption: "Screenshot needed: Sieve/expression-based rewriting rule editor in the WebUI."

  - kind: feature
    reverse: true
    band: alt
    eyebrow: Web admin
    title: Queue, reports and live tracing in a browser.
    body: >-
      An SMTP operator should not need a terminal to do day-to-day work.
      The web admin covers queue management for messages and outbound
      DMARC and TLS reports, visualisation of received DMARC, TLS-RPT
      and ARF reports, log search and live tracing of an in-flight
      transaction.
    bullets:
      - Queue management for messages and outbound reports.
      - Received DMARC, TLS-RPT and ARF (failure) report visualisation.
      - Live tracing and message delivery history.
      - Log viewer with search and filtering.
    visual:
      kind: screenshot
      src: /images/webadmin/dashboard-performance.png
      alt: Stalwart performance dashboard
      url: admin.stalw.art / Dashboard

  - kind: feature
    eyebrow: High availability
    title: Cluster the way you want, with or without a coordinator.
    body: >-
      Some teams already run Kafka or NATS and want to use it; some
      teams would rather not run a coordinator service at all. Stalwart
      handles both. Peer-to-peer coordination uses Eclipse Zenoh, with
      no separate service to operate. Coordinator-based deployments use
      Apache Kafka, Redpanda, NATS or Redis as the transport. Either
      mode supports node autodiscovery and partition-tolerant failure
      detection.
    bullets:
      - Peer-to-peer cluster coordination over Zenoh (no coordinator service).
      - Kafka, Redpanda, NATS or Redis as alternatives for coordinator-based clusters.
      - Distributed, fault-tolerant SMTP queue.
      - Outbound MTA cluster role for dedicated submission and relay tiers.
    visual:
      kind: diagram
      id: cluster

